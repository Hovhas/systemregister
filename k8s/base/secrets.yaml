# VIKTIGT: Denna fil måste SOPS-krypteras innan commit!
#
# Kryptera med:
#   sops -e -i k8s/base/secrets.yaml
#
# Dekryptera för redigering:
#   sops k8s/base/secrets.yaml
#
# Kräver age-nyckel konfigurerad i .sops.yaml (se projektroten)
# DATABASE_URL hanteras av CNPG via secret "systemregister-db-app" —
# denna secret innehåller bara app-specifika hemligheter.
apiVersion: v1
kind: Secret
metadata:
  name: systemregister-secrets
type: Opaque
stringData:
  SECRET_KEY: CHANGE_ME
