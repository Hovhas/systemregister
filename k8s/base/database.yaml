apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: systemregister-db
spec:
  instances: 1
  storage:
    storageClass: longhorn
    size: 5Gi
  bootstrap:
    initdb:
      database: systemregister
      owner: systemregister
  # CNPG skapar automatiskt secret: systemregister-db-app
  # med nycklarna: username, password, dbname, host, port, uri, jdbc-uri
  backup:
    barmanObjectStore:
      destinationPath: ""  # Placeholder — fyll i S3/MinIO-sökväg vid aktivering
      s3Credentials:
        accessKeyId:
          name: cnpg-backup-credentials
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: cnpg-backup-credentials
          key: SECRET_ACCESS_KEY
    retentionPolicy: "7d"
  monitoring:
    enablePodMonitor: false
