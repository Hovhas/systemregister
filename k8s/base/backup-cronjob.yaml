apiVersion: batch/v1
kind: CronJob
metadata:
  name: systemregister-db-backup
spec:
  schedule: "0 2 * * *"  # Dagligen kl 02:00
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          serviceAccountName: systemregister-backup-sa
          containers:
            - name: backup
              image: bitnami/postgresql:16
              command:
                - /bin/bash
                - -c
                - |
                  set -euo pipefail
                  TIMESTAMP=$(date +%Y%m%d_%H%M%S)
                  echo "Startar backup: systemregister $TIMESTAMP"
                  pg_dump \
                    --host="$PGHOST" \
                    --username="$PGUSER" \
                    --dbname="$PGDATABASE" \
                    --format=custom \
                    --no-password \
                    --file="/backup/systemregister_${TIMESTAMP}.dump"
                  echo "Backup klar: /backup/systemregister_${TIMESTAMP}.dump"
                  # Rensa dumps äldre än 14 dagar
                  find /backup -name "*.dump" -mtime +14 -delete
                  echo "Rensning klar"
              env:
                - name: PGHOST
                  valueFrom:
                    secretKeyRef:
                      name: systemregister-db-app
                      key: host
                - name: PGUSER
                  valueFrom:
                    secretKeyRef:
                      name: systemregister-db-app
                      key: username
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: systemregister-db-app
                      key: password
                - name: PGDATABASE
                  valueFrom:
                    secretKeyRef:
                      name: systemregister-db-app
                      key: dbname
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 256Mi
              volumeMounts:
                - name: backup-storage
                  mountPath: /backup
          volumes:
            - name: backup-storage
              # Byt till PVC för persistent lagring, eller S3-CSI för offsite backup
              # Placeholder: emptyDir förlorar data när pod avslutas
              emptyDir: {}
---
# ServiceAccount för backup-jobbet
# Om CNPG-backup via barman används istället kan denna tas bort
apiVersion: v1
kind: ServiceAccount
metadata:
  name: systemregister-backup-sa
