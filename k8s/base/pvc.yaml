# Om du använder CloudNativePG operator: ersätt denna PVC med en Cluster-resurs.
# Denna PVC är för en enkel PostgreSQL StatefulSet-deploy.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: systemregister-db
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi
