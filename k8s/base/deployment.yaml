apiVersion: apps/v1
kind: Deployment
metadata:
  name: systemregister
  labels:
    app: systemregister
spec:
  replicas: 1
  # Recreate krävs eftersom CNPG RWO-volymer inte stöder RollingUpdate (Multi-Attach error)
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: systemregister
  template:
    metadata:
      labels:
        app: systemregister
    spec:
      initContainers:
        - name: alembic-migrate
          image: ghcr.io/hovhas/systemregister:latest
          command: ["alembic", "upgrade", "head"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  # CNPG skapar detta secret automatiskt med nyckel "uri"
                  name: systemregister-db-app
                  key: uri
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
      containers:
        - name: systemregister
          image: ghcr.io/hovhas/systemregister:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: systemregister-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  # CNPG skapar detta secret automatiskt med nyckel "uri"
                  name: systemregister-db-app
                  key: uri
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: systemregister-secrets
                  key: SECRET_KEY
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
