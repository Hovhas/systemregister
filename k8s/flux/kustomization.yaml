apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: systemregister
  namespace: flux-system
spec:
  interval: 5m
  prune: true
  sourceRef:
    kind: GitRepository
    name: systemregister
  path: ./k8s/overlays/prod
  targetNamespace: systemregister
  # SOPS-dekryptering via age-nyckel (samma som används i k3s-homelab)
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: systemregister
      namespace: systemregister
    - apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      name: systemregister-db
      namespace: systemregister
  timeout: 5m
