name: Build and Push

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: |
          cd backend
          uv pip install --system -r pyproject.toml
          uv pip install --system pytest pytest-asyncio httpx ruff pip-audit
      - name: Ruff lint
        run: cd backend && ruff check .
        continue-on-error: true  # TODO: fixa befintliga lint-fel och ta bort detta
      - name: Security scan (pip-audit)
        run: cd backend && pip-audit --requirement pyproject.toml
        continue-on-error: true
      - name: Run backend tests (per file for session isolation)
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
          DATABASE_URL_SYNC: postgresql://test:test@localhost:5432/test
          TEST_DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
        run: |
          cd backend
          FAILED=""
          for f in tests/test_*.py; do
            echo "=== Running $f ==="
            pytest "$f" -v || FAILED="$FAILED $f"
          done
          if [ -n "$FAILED" ]; then
            echo "Failed test files:$FAILED"
            exit 1
          fi

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: ESLint
        run: cd frontend && npm run lint
        continue-on-error: true  # TODO: fixa befintliga lint-varningar
      - name: TypeScript check
        run: cd frontend && npx tsc -b
      - name: Vitest
        run: cd frontend && npm test -- --run
      - name: Production build
        run: cd frontend && npm run build
      - name: npm audit
        run: cd frontend && npm audit --audit-level=high
        continue-on-error: true

  build:
    needs: [backend-test, frontend-test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate timestamp tag
        id: meta
        run: echo "ts=$(date -u +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/hovhas/systemregister:latest
            ghcr.io/hovhas/systemregister:${{ steps.meta.outputs.ts }}
