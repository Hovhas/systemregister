services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: systemregister
      POSTGRES_USER: systemregister
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U systemregister"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql+asyncpg://systemregister:devpassword@db:5432/systemregister
      DATABASE_URL_SYNC: postgresql://systemregister:devpassword@db:5432/systemregister
      SECRET_KEY: dev-secret-key-change-in-prod
      ENVIRONMENT: development
      LOG_LEVEL: DEBUG
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
